openapi: 3.0.0
info:
  title: postgress users
  version: 1.0.0
servers:
  - url: /
    description: API same origin
paths:
  /health:
    get:
      tags:
        - General
      summary: GET-health
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/register:
    post:
      tags:
        - General
      summary: CREATE-user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                username: user5
                password: '123456'
                role: user
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/login:
    post:
      tags:
        - General
      summary: LOGIN-user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                username: user5
                password: '123456'
      responses:
        '200':
          description: Successful response
          content:  
            application/json: {}
  /api/books:
    post:
      tags:
        - General
      summary: CREATE-books
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                title: El libro de user5
                author: Yo
                country: Spain
                language: Spanish
                pages: 1000
                year: 2026
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    get:
      tags:
        - General
      summary: GET-books
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/books/{id}:
    put:
      tags:
        - General
      summary: UPDATE-book
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                title: Libro actualizado user5
                author: Ana
                country: Spain
                language: Spanish
                pages: 150
                year: 2026
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - General
      summary: DELETE-book
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
